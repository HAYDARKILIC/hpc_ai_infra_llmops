# ---------------------------------------------------------------------------
# 350M-parameter GPT — single-node training config.
# ---------------------------------------------------------------------------
seed: 42

model:
  name: gpt_350m
  hidden_size: 1024
  num_layers: 24
  num_heads: 16
  vocab_size: 50257
  seq_length: 1024
  tied_embeddings: true

training:
  global_batch_size: 256
  micro_batch_size: 8
  max_steps: 50_000
  lr: 6.0e-4
  min_lr: 6.0e-5
  warmup_steps: 1_000
  weight_decay: 0.1
  grad_clip: 1.0
  beta1: 0.9
  beta2: 0.95

parallelism:
  data_parallel_size: 4
  tensor_parallel_size: 1
  pipeline_parallel_size: 1

precision:
  dtype: bf16

zero:
  stage: 2

checkpointing:
  interval_steps: 1_000
  out_dir: ./checkpoints/gpt_350m
  keep_last_n: 3

logging:
  project: hpc-llm-forge
  run_name: gpt-350m-baseline
  log_interval: 20
